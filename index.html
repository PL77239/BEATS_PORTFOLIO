<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Store - Detroit / Bay Area Vibe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


<div id="dice-overlay" aria-hidden="true">
  <canvas id="dice-canvas" aria-hidden="true"></canvas>
  <div class="die die-5">
    <div class="die-cube">
      <div class="die-face face-front"><span class="pips pips-5"></span></div>
      <div class="die-face face-back"><span class="pips pips-2"></span></div>
      <div class="die-face face-right"><span class="pips pips-3"></span></div>
      <div class="die-face face-left"><span class="pips pips-4"></span></div>
      <div class="die-face face-top"><span class="pips pips-1"></span></div>
      <div class="die-face face-bottom"><span class="pips pips-6"></span></div>
    </div>
  </div>
  <div class="die die-6">
    <div class="die-cube">
      <div class="die-face face-front"><span class="pips pips-6"></span></div>
      <div class="die-face face-back"><span class="pips pips-1"></span></div>
      <div class="die-face face-right"><span class="pips pips-4"></span></div>
      <div class="die-face face-left"><span class="pips pips-3"></span></div>
      <div class="die-face face-top"><span class="pips pips-2"></span></div>
      <div class="die-face face-bottom"><span class="pips pips-5"></span></div>
    </div>
  </div>
</div>

<div id="intro-container">
  <div id="garage-door">
    <div class="drag-instruction">Swipe up to open</div>
    <div class="handle"></div>
  </div>
  <div id="dark-tunnel"></div>
</div>


<div id="main-content" class="hidden">
  <div id="bg-visual"></div>

  <aside class="genre-selector" id="genre-selector" aria-label="Genre selector">
    <button class="genre-label" type="button" aria-expanded="false">Genre</button>
    <div class="genre-options" role="group" aria-label="Available genres">
      <button class="genre-option active" type="button" data-genre="Various" aria-pressed="true">Various</button>
      <button class="genre-option" type="button" data-genre="Florida" aria-pressed="false">Florida</button>
      <button class="genre-option" type="button" data-genre="Detroit" aria-pressed="false">Detroit</button>
      <button class="genre-option" type="button" data-genre="West Coast" aria-pressed="false">West Coast</button>
      <button class="genre-option" type="button" data-genre="Trap" aria-pressed="false">Trap</button>
    </div>
  </aside>

  <h1 class="neon-sign">BEAT CATA<span class="flicker-letter">L</span>OG</h1>

  <div class="shuffle-container">
    <button id="shuffle-btn" type="button" aria-label="Shuffle beat" title="Shuffle beat">
      <svg class="shuffle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M2 7h4.2c1.2 0 2.4.5 3.2 1.4l4.3 4.6c.8.9 2 1.4 3.2 1.4H22" />
        <path d="M18.5 4L22 7.5 18.5 11" />
        <path d="M2 17h4.2c1.2 0 2.4-.5 3.2-1.4l4.3-4.6c.8-.9 2-1.4 3.2-1.4H22" />
        <path d="M18.5 13L22 16.5 18.5 20" />
      </svg>
    </button>
  </div>

  <div class="beat-grid" id="beat-grid"></div>
</div>

<script src="https://unpkg.com/three@0.124.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.124.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="script.js"></script>
</body>
</html>
