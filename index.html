<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Store - Detroit / Bay Area Vibe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


<div id="dice-overlay" aria-hidden="true">
  <div class="die die-5"></div>
  <div class="die die-6"></div>
</div>

<div id="intro-container">
  <div id="garage-door">
    <div class="drag-instruction">Swipe up to open</div>
    <div class="handle"></div>
  </div>
  <div id="dark-tunnel"></div>
</div>


<div id="main-content" class="hidden">
  <div id="bg-visual"></div>

  <h1 class="neon-sign">BEAT CATALOG</h1>

  <div class="shuffle-container">
    <button id="shuffle-btn">SHUFFLE BEAT 🎲</button>
  </div>

  <div class="beat-grid" id="beat-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
