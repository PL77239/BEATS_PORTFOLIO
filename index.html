<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beat Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="dice-overlay" aria-hidden="true">
      <div class="die die-5"></div>
      <div class="die die-6"></div>
    </div>

    <header class="hero">
      <h1>LA/Detroit Beat Store</h1>
      <button id="shuffle-btn" type="button">Shuffle</button>
    </header>

    <main class="beat-grid">
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>Motor City Bounce</h2>
          </div>
          <div class="beat-face beat-back">
            <p>120 BPM · Dirty synth bass</p>
          </div>
        </div>
      </article>
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>Sunset Blvd</h2>
          </div>
          <div class="beat-face beat-back">
            <p>142 BPM · West coast keys</p>
          </div>
        </div>
      </article>
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>8 Mile Drift</h2>
          </div>
          <div class="beat-face beat-back">
            <p>135 BPM · Vinyl crackle bounce</p>
          </div>
        </div>
      </article>
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>Blue Rag Top</h2>
          </div>
          <div class="beat-face beat-back">
            <p>98 BPM · Moody piano chops</p>
          </div>
        </div>
      </article>
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>Palm Trees & Chrome</h2>
          </div>
          <div class="beat-face beat-back">
            <p>110 BPM · Funk guitar loop</p>
          </div>
        </div>
      </article>
      <article class="beat-card">
        <div class="beat-card-inner">
          <div class="beat-face beat-front">
            <h2>Gratiot Nights</h2>
          </div>
          <div class="beat-face beat-back">
            <p>128 BPM · Perc-heavy bounce</p>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
